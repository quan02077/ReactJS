<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>React JSX</title>

    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.7/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        function PostItem() {
            return (
                <div className="post-item">
                    <img src="https://files.fullstack.edu.vn/f8-prod/blog_posts/311/6147eea9cef9c.png" alt="" />
                    <h2 className="post-title">C#(.NET) - Tương tác với file Excel</h2>
                    <p className="post-desc">Alo Alo</p>
                    <p className="post-published">2 ngày trước</p>
                </div>
            )
        }

        class Content extends React.Component {
            render() {
                return (
                    <div className="post-item">
                        <img src="https://files.fullstack.edu.vn/f8-prod/blog_posts/311/6147eea9cef9c.png" alt="" />
                        <h2 className="post-title">C#(.NET) - Tương tác với file Excel</h2>
                        <p className="post-desc">Alo Alo</p>
                        <p className="post-published">2 ngày trước</p>
                    </div>
                )
            }
        }
        const app = (
            <div className="posts-list">
                <PostItem />
                <Content />
            </div>
        )
        ReactDOM.render(app, document.getElementById("root"))
    </script>
</body>

</html>
