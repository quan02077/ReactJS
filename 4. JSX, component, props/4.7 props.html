            price,
            studentscount

                    <h2 className='courseTitle'>{title}</h2>
                    <p className='courseDesc'>{desc}</p>
                    <p className='price'>{price}</p>
                    <p className='studentCount'>{studentscount}</p>
                </div>
            )

            return (

                                price={course.price}
                                studentscount={course.students_count}

            )
